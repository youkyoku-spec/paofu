<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sample List</title>
</head>
<body>

<h1>ユーザー一覧</h1>

<table border="1">
    <tr>
        <th>ログインID</th>
        <th>ユーザー名</th>
		<th>パスワード</th>
		<th>権限ID</th>
    </tr>

    <tr th:each="s : ${sample}">
        <td th:text="${s.login_id}"></td>
        <td th:text="${s.user_name}"></td>
		<td th:text="${s.password}"></td>
		<td th:text="${s.role_id}"></td>
    </tr>
</table>

</body>
</html>
