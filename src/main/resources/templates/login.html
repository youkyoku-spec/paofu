<!DOCTYPE html>
<html>

<head>
	<title>Webエクササイズ</title>
	<meta charset="utf-8" name="viewport"
		content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0" />
	<!-- CSSの読み込み -->
	<link type="text/css" rel="stylesheet" href="./css/bootstrap.min.css">
	<link type="text/css" rel="stylesheet" href="./css/froala_blocks.css">
	<link type="text/css" rel="stylesheet" href="./css/gips.css">
	<!-- JSの読み込み -->
	<script type="text/javascript" src="./js/jquery-3.5.1.min.js" defer="defer"></script>
	<script type="text/javascript" src="./js/bootstrap.min.js" defer="defer"></script>
</head>

<body>
	<!-- ヘッダ -->
	<header class="bg-dark">
		<div class="container">
			<nav class="navbar navbar-expand-md no-gutters">
				<div class="col-2 text-left" id="logo">
					<img src="./images/logo.png" height="40" alt="image">
				</div>
				<div class="collapse navbar-collapse navbar-collapse-4 col-2">
					<span th:text="${systemName}">システム名</span>
				</div>
				<div class="collapse navbar-collapse navbar-collapse-4 col-4" id="navbarNav01">
					<ul class="navbar-nav justify-content-center">
						<li class="nav-item nav-link"><a href="registUser.html">ユーザ登録</a></li>
					</ul>
				</div>
				<div class="collapse navbar-collapse navbar-collapse-4 col-4" id="navbarNav02">
					<ul class="navbar-nav justify-content-center">
						<li class="nav-item"><a class="nav-link" href="index.html" id="linkLogout">ログアウト</a></li>
					</ul>
				</div>
			</nav>
		</div>
	</header>

	<!-- メッセージ表示 -->
	<div id="message_area"></div>

	<section class="fdb-block py-0 sectionHeight">
		<div class="container my-5">

			<!-- ここにHTMLをかく -->
			<form method="post" action="/" th:object="${loginForm}">
				<div th:if="${#arrays.length(#fields.detailedErrors())} > 0" class="row">
					<div class="col-md-12 m-3">
						<div class="p-3 mb-2 bg-danger text-white">
							<div th:each="error : ${#fields.detailedErrors()}">
								<span th:text="${error.message}"></span>
							</div>
						</div>
					</div>
				</div>

				<div class=" row justify-content-center">
					<div class="col-12 col-md-8 col-lg-6 col-xl-5 text-left">
						<div class="row">
							<div class="col">
								<h1>ログイン</h1>
								<p class="lead">ユーザIDとパスワードを入力してください。</p>
							</div>
						</div>
						<div class="row">
							<div class="col mt-4">
								<input type="text" class="form-control" th:field="*{userId}" placeholder="ユーザID">
								<span class="text-danger" th:if="${#fields.hasErrors('userId')}"
									th:errors="*{userId}"></span>
								<span class="text-danger" th:if="${#fields.hasErrors('textEmpty')}"
									th:errors="*{textEmpty}"></span>
							</div>
						</div>
						<div class="row">
							<div class="col mt-4">
								<input type="password" class="form-control" th:field="*{password}" placeholder="パスワード">
								<span class="text-danger" th:if="${#fields.hasErrors('password')}"
									th:errors="*{password}"></span>
							</div>
						</div>
						<div class="row">
							<div class="col mt-4">
								<input type="checkbox" name="checkLogin" id="loginInfoSave">
								<label for="loginInfoSave" class="checkbox-inline">ログイン情報を保存する</label>
							</div>
						</div>
						<div class="row">
							<div class="col mt-4">
								<button class="btn btn-secondary" type="submit">ログイン</button>
							</div>
						</div>
					</div>
				</div>
			</form>

		</div>
	</section>

	<!-- フッタ -->
	<footer class="fdb-block footer-small bg-dark footer">
		<div class="container">
			<div class="row text-center">
				<div class="col" id="copywrite">
					<p>© 2019 Solid Communication Inc. All Rights Reserved</p>
				</div>
			</div>
		</div>
	</footer>

</body>

</html>
